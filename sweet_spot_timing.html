<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pinsel Animation mit Zoom</title>
    <style>
        body { 
            background-color: #1e293b; 
            margin: 0; 
            height: 300vh; /* Gibt uns 3 Bildschirmlängen zum Scrollen/Zoomen */
            overflow-x: hidden; /* Verhindert seitliches Scrollen */
        }
        
        .kamera-kleber {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* WICHTIG: Schneidet das Bild ab, wenn es beim Zoomen riesig wird */
        }

        /* Der Container, der gezoomt wird */
        .zoom-element {
            width: 100%;
            max-width: 500px; /* Die Originalgröße deines Kunstwerks */
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center; /* Zoomt aus der Mitte heraus */
        }

        .zoom-element svg {
            width: 100%;
            height: auto;
        }

        .pfad-1 {
            /* Dein Puffer-Wert für die Sichtbarkeit */
            stroke-dasharray: 2000; 
            stroke-dashoffset: 2000; /* Startet unsichtbar */
        }
    </style>
</head>
<body>

    <div class="kamera-kleber">
        <div class="zoom-element">
            <svg viewBox="0 0 500 295">
                <defs>
                    <filter id="raue-front" x="-20%" y="-20%" width="140%" height="140%">
                        <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="4" result="rauschen" />
                        <feDisplacementMap in="SourceGraphic" in2="rauschen" scale="10" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                    <mask id="maske-bild-1">
                        <path class="pfad-1"
                              d="M 0,420 650,0"
                              fill="none"
                              stroke="white"
                              stroke-width="200" /* Dein angepasster, dünnerer Pinsel */
                              stroke-linecap="round"
                              filter="url(#raue-front)" />
                    </mask>
                </defs>
                <image href="/edited/background_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-1)" />
            </svg>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ==========================================
        // EVENT 1: BEIM LADEN (Zeichnen)
        // ==========================================
        gsap.to(".pfad-1", {
            strokeDashoffset: 0,
            duration: 2,
            delay: 0.5,
            ease: "power2.out"
        });

        // ==========================================
        // EVENT 2: BEIM SCROLLEN (Radieren + Zoomen)
        // ==========================================
        // Wir packen beides in eine Timeline, damit es perfekt synchron läuft
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "+=100%",
                scrub: 0.5
            }
        });

        // Aktion A: Das Bild wird beim Scrollen wegradiert
        tl.to(".pfad-1", {
            strokeDashoffset: 2000, 
            ease: "none",
            immediateRender: false // WICHTIG: Stört das Lade-Skript nicht!
        }, 0); // Die "0" am Ende bedeutet: Starte sofort beim Scrollen

        // Aktion B: GLEICHZEITIG wird der Container herangezoomt
        tl.to(".zoom-element", {
            scale: 5, // Faktor für den Zoom
            ease: "power1.in" // Fängt sanft an und zoomt dann immer schneller
        }, 0); // Auch hier die "0", damit Zoom und Radieren exakt synchron laufen

    </script>
</body>
</html>
