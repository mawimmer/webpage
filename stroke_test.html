<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Home</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #FDBB2D;
            background: linear-gradient(0deg, rgba(253, 187, 45, 1) 0%, rgba(34, 193, 195, 1) 100%);
        }
        .content {
            padding: 20px;
            background: rgba(165, 165, 165, 0.288);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }

        
        .bild-stapel {
            display: grid;
            width: 500px; /* So breit wie dein Kunstwerk sein soll */
            margin: auto; /* Zentriert den Stapel auf der Seite */
        }

        .bild-stapel img {
            /* Zauberspruch: Setzt jedes Bild in Reihe 1, Spalte 1 */
            grid-area: 1 / 1; 
            width: 100%; /* Die Bilder füllen den Container perfekt aus */
            height: auto;
        }

        /* Optional: Reihenfolge der Ebenen bestimmen (je höher die Zahl, desto weiter vorne) */
        .ebene-1 { z-index: 1; }
        .ebene-2 { z-index: 2; }
        .ebene-3 { z-index: 3; }

        .pfad-1, .pfad-2, .pfad-3 {
            stroke-dasharray: 8000; 
            stroke-dashoffset: 8000;
        }

        .pfad-1 {
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.75, 1) forwards;
        }

        /* Pfad 2: Startet mit 1 Sekunde Verzögerung */
        .pfad-2 {
            animation: pinsel-zieh 5s cubic-bezier(0.85, 0.5, 0.75, 1) forwards;
            animation-delay: 0.7s; 
        }

        .pfad-3 {
            animation: pinsel-zieh 5s cubic-bezier(0.85, 0.5, 0.75, 1) forwards; 
            animation-delay: 2s; 
        }

        /* === CSS für das Layout (Die "Handbewegung") === */
        
        body { 
            background-color: #444456; /* Dunkel, damit man den Effekt sieht */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Die Klasse für den Masken-Pfad, der animiert wird */
        .masken-zeichner {
            /* Die ungefähre Länge des Pfads (anpassen, wenn der Pfad anders ist!) */
            stroke-dasharray: 800; 
            stroke-dashoffset: 800;
            
            /* HIER regelst du Zeit (2s) und Rhythmus */
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes pinsel-zieh {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>
    
    <div class="hero">
        
        <div class="content">

            <svg viewBox="0 0 500 500" width="500" height="500">
        <defs>
            <mask id="maske-bild-1">
                <path class="pfad-1" 
                      d="M 0,420 650,0" /* Strich oben */
                      fill="none" stroke="white" stroke-width="200" stroke-linecap="round" />
            </mask>

            <mask id="maske-bild-2">
                <path class="pfad-2" 
                      d="M209.021 471.323L459.5 184.211L145.3 449.96L385.862 131.724L55.3183 471.323C1.81911 529.887 -59.6743 583.995 122.345 331.911C304.365 79.8267 366.152 5.87858 374.293 0.415039" /* Strich unten, ganz andere Kurve! */
                      fill="none" stroke="white" stroke-width="80" stroke-linecap="round" />
            </mask>
                        <mask id="maske-bild-3">
                <path class="pfad-3" 
                      <path d="M0.478027 381.882C48.9211 223.623 114.377 82.4434 141.049 31.6361L97.7967 245.675L237.287 65.1473L132.399 387.287L231.88 216.488V372.153L492.478 0.286942" /* Strich unten, ganz andere Kurve! */
                      fill="none" stroke="white" stroke-width="200" stroke-linecap="round" />
            </mask>
        </defs>

        <image href="/background_stroke.png" x="0" y="0" width="500" height="500" mask="url(#maske-bild-1)" />

        <image href="/highlight_stroke.png" x="0" y="0" width="500" height="500" mask="url(#maske-bild-2)" />

        <image href="/mw_stroke.png" x="0" y="0" width="500" height="500" mask="url(#maske-bild-3)" />

    </svg>
            <!--
            <h1>Something is happening here! 🚀</h1>
        -->
        </div>
    </div>
</body>
</html>
