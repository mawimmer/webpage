<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pinsel-Effekt auf PNG</title>
    <style>

        .bild-stapel {
            display: grid;
            width: 500px; /* So breit wie dein Kunstwerk sein soll */
            margin: auto; /* Zentriert den Stapel auf der Seite */
        }

        .bild-stapel img {
            /* Zauberspruch: Setzt jedes Bild in Reihe 1, Spalte 1 */
            grid-area: 1 / 1; 
            width: 100%; /* Die Bilder füllen den Container perfekt aus */
            height: auto;
        }

        /* Optional: Reihenfolge der Ebenen bestimmen (je höher die Zahl, desto weiter vorne) */
        .ebene-1 { z-index: 1; }
        .ebene-2 { z-index: 2; }
        .ebene-3 { z-index: 3; }

        .pfad-1, .pfad-2, .pfad-3 {
            stroke-dasharray: 8000; 
            stroke-dashoffset: 8000;
        }

        .pfad-1 {
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        /* Pfad 2: Startet mit 1 Sekunde Verzögerung */
        .pfad-2 {
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.15, 1) forwards;
            animation-delay: 0.7s; 
        }

        .pfad-3 {
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.15, 1) forwards; 
            animation-delay: 1.5s; 
        }

        /* === CSS für das Layout (Die "Handbewegung") === */
        
        body { 
            background-color: #444456; /* Dunkel, damit man den Effekt sieht */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Die Klasse für den Masken-Pfad, der animiert wird */
        .masken-zeichner {
            /* Die ungefähre Länge des Pfads (anpassen, wenn der Pfad anders ist!) */
            stroke-dasharray: 800; 
            stroke-dashoffset: 800;
            
            /* HIER regelst du Zeit (2s) und Rhythmus */
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes pinsel-zieh {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>

<svg viewBox="0 0 500 500" width="500" height="500">
        <defs>
            <mask id="maske-bild-1">
                <path class="pfad-1" 
                      d="M 0,420 650,0" /* Strich oben */
                      fill="none" stroke="white" stroke-width="200" stroke-linecap="round" />
            </mask>

            <mask id="maske-bild-2">
                <path class="pfad-2" 
                      d="M 0 400 L 455 43 L -127 282 L 392 21 L -97 136 L 290 9" /* Strich unten, ganz andere Kurve! */
                      fill="none" stroke="white" stroke-width="80" stroke-linecap="round" />
            </mask>
                        <mask id="maske-bild-3">
                <path class="pfad-3" 
                      d="M 0 400 L 455 43 L -127 282 L 392 21 L -97 136 L 290 9" /* Strich unten, ganz andere Kurve! */
                      fill="none" stroke="white" stroke-width="200" stroke-linecap="round" />
            </mask>
        </defs>

        <image href="/background_stroke.png" x="0" y="0" width="500" height="500" mask="url(#maske-bild-1)" />

        <image href="/highlight_stroke.png" x="0" y="0" width="500" height="500" mask="url(#maske-bild-2)" />

        <image href="/mw_stroke.png" x="0" y="0" width="500" height="500" mask="url(#maske-bild-3)" />

    </svg>
