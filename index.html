<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Home</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #FDBB2D;
            background: linear-gradient(0deg, rgba(253, 187, 45, 1) 0%, rgba(34, 193, 195, 1) 100%);
        }
        .content {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="content">
            <h1>Something is happening here! 🚀</h1>
        </div>
        <style>
            .pinsel {
                fill: none;
                stroke: #a855f7; /* Dein Neon-Lila */
                stroke-width: 8;
                stroke-linecap: round;
                
                /* Der Trick: */
                stroke-dasharray: 600; /* Die ungefähre Länge der Linie */
                stroke-dashoffset: 600; /* Startet komplett verschoben (unsichtbar) */
                
                /* Die Animation */
                animation: zeichnen 2s ease-out forwards;
            }

            @keyframes zeichnen {
                to {
                    stroke-dashoffset: 0; /* Schiebt die Linie ins Bild */
                }
            }
        </style>
    
        <svg viewBox="0 0 500 150" width="100%" height="150">
            <path class="pinsel" d="M 50,100 Q 250,10 450,100" />
        </svg>
        
    </div>
</body>
</html>
