<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Home</title>
    <style>

        .container {
        /* Standard-Größe (z.B. 50% der Bildschirmbreite) */
        width: 40vw;

        /* Zentriert den Rahmen auf der Seite */
        margin: 10 auto;

        /* Das ist wichtig, damit das Bild nicht verzerrt wird! */
        /* Setze das Seitenverhältnis deines SVGs. 1/1 ist ein Quadrat. */
        }
        
        .container svg {
            display: block; /* WICHTIG: Verhindert komische unsichtbare Ränder! */
            width: 100%;    /* Füllt die Breite des Rahmens aus */
            height: auto;   /* Berechnet die Höhe automatisch (kein aspect-ratio nötig!) */
        }

        .bild-stapel {
            display: grid;
            width: 500px; /* So breit wie dein Kunstwerk sein soll */
            margin: auto; /* Zentriert den Stapel auf der Seite */
        }

        .bild-stapel img {
            /* Zauberspruch: Setzt jedes Bild in Reihe 1, Spalte 1 */
            grid-area: 1 / 1; 
            width: 100%; /* Die Bilder füllen den Container perfekt aus */
            height: auto;
        }

        /* Optional: Reihenfolge der Ebenen bestimmen (je höher die Zahl, desto weiter vorne) */
        .ebene-1 { z-index: 1; }
        .ebene-2 { z-index: 2; }
        .ebene-3 { z-index: 3; }

        .pfad-1, .pfad-2, .pfad-3 {
            stroke-dasharray: 3000; 
            stroke-dashoffset: 3000;
        }

        .pfad-1 {
            animation: pinsel-zieh 1s cubic-bezier(0.85, 0, 0.5, 1) forwards;
        }

        /* Pfad 2: Startet mit 1 Sekunde Verzögerung */
        .pfad-2 {
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0.9, 0.5, 1) forwards;
            animation-delay: 0.5s; 
        }

        .pfad-3 {
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0.1, 0.5, 1) forwards; 
            animation-delay: 1.4s; 
        }

        /* === CSS für das Layout (Die "Handbewegung") === */
        
        body { 
            background-color: #444456; /* Dunkel, damit man den Effekt sieht */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Die Klasse für den Masken-Pfad, der animiert wird */
        .masken-zeichner {
            /* Die ungefähre Länge des Pfads (anpassen, wenn der Pfad anders ist!) */
            stroke-dasharray: 800; 
            stroke-dashoffset: 800;
            
            /* HIER regelst du Zeit (2s) und Rhythmus */
            animation: pinsel-zieh 3s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes pinsel-zieh {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <svg width="1000" height="590" viewBox="0 0 500 295">
            <defs>
                <filter id="raue-front" x="-20%" y="-20%" width="140%" height="140%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" result="rauschen" />
                    <feDisplacementMap in="SourceGraphic" in2="rauschen" scale="10" xChannelSelector="R" yChannelSelector="G" />
                </filter>
                <mask id="maske-bild-1">
                    <path class="pfad-1" 
                        d="M 0,420 650,0"
                        fill="none" stroke="white" stroke-width="400" stroke-linecap="round" 
                        filter="url(#raue-front)"
                        />
                        
                </mask>

                <mask id="maske-bild-2">
                    <path class="pfad-2" 
                        d="M180.5 299.788L366 76.7881L74 310.288L292.5 0.288057"
                        fill="none" stroke="white" stroke-width="100" stroke-linecap="round" 
                        filter="url(#raue-front)"
                        />
                </mask>
                            <mask id="maske-bild-3">
                    <path class="pfad-3" 
                        d="M17.5 138.5L491 128.5"
                        fill="none" stroke="white" stroke-width="300" stroke-linecap="round" 
                        />
                </mask>
            </defs>

            <image href="/edited/background_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-1)" />

            <image href="/edited/highlight_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-2)" />

            <image href="/edited/mw_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-3)" />

        </svg>
    </div>
</body>
</html>
