<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Home</title>
    <style>
        body { 
            background-color: #1e293b; 
            margin: 0; 
            height: 300vh; /* Platz zum Scrollen */
            overflow-x: hidden;
            background: radial-gradient(circle, rgb(72, 86, 104) 0%, rgb(127, 128, 120) 100%);
        }
        
        .kamera-kleber {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .zoom-element {
            width: 100%;
            max-width: 500px; 
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center; 
        }

        .zoom-element, .pfad-1, .pfad-2, .pfad-3 {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000;
            -webkit-perspective: 1000;
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
            will-change: transform, stroke-dashoffset;
        }
        .zoom-element svg {
            width: 100%;
            height: auto;
        }

        /* DEIN ORIGINAL CSS IST ZURÜCK! Genau deine Zeiten und Beziers! */
        .pfad-1, .pfad-2, .pfad-3 {
            stroke-dasharray: 2000; 
            stroke-dashoffset: 2000; 
        }
        
        .pfad-1 { animation: pinsel-zieh 1s cubic-bezier(0.85, 0, 0.5, 1) forwards; animation-delay: 1s; }
        .pfad-2 { animation: pinsel-zieh 3s cubic-bezier(0.85, 0.9, 0.5, 1) forwards; animation-delay: 1.5s; }
        .pfad-3 { animation: pinsel-zieh 3s cubic-bezier(0.85, 0.1, 0.5, 1) forwards; animation-delay: 2.4s; }

        @keyframes pinsel-zieh { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div class="kamera-kleber">
        <div class="zoom-element">
            <svg viewBox="0 0 500 295">
                <defs>
                    <!--
                    <filter id="raue-front" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
                        <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="1" result="rauschen" />
                        <feDisplacementMap in="SourceGraphic" in2="rauschen" scale="10" xChannelSelector="R" yChannelSelector="G" />
                    </filter>
                    -->
                    <mask id="maske-bild-1">
                        <path class="pfad-1" d="M 0,420 650,0" fill="none" stroke="white" stroke-width="400" stroke-linecap="round" filter="url(#raue-front)" />
                    </mask>
                    <mask id="maske-bild-2">
                        <path class="pfad-2" d="M180.5 299.788L366 76.7881L74 310.288L292.5 0.288057" fill="none" stroke="white" stroke-width="70" stroke-linecap="round" filter="url(#raue-front)" />
                    </mask>
                    <mask id="maske-bild-3">
                        <path class="pfad-3" d="M17.5 138.5L491 128.5" fill="none" stroke="white" stroke-width="150" stroke-linecap="round" filter="url(#raue-front)"/>
                    </mask>
                </defs>
                
                <image href="/edited/background_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-1)" />
                <image href="/edited/highlight_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-2)" />
                <image href="/edited/mw_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-3)" />
            </svg>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        
        gsap.registerPlugin(ScrollTrigger);

gsap.config({
    force3D: true // Erzwingt 3D-Beschleunigung für alle Animationen
});

const tl = gsap.timeline({
    scrollTrigger: {
        trigger: "body",
        start: "10px top", 
        end: "+=150%", 
        scrub: 1, // Ein höherer Scrub-Wert (1 bis 1.5) glättet Ruckler auf Mobile besser ab
        
        onEnter: () => {
            gsap.set(".zoom-element", { animation: "none", scale: 1 });
            gsap.set(".pfad-1, .pfad-2, .pfad-3", { 
                animation: "none", 
                strokeDashoffset: 0,
                force3D: true 
            });
        }
    }
});

        // 1. ZOOM: Genau dein Wert!
        tl.to(".zoom-element", { scale: 3.5, ease: "power1.in", duration: 1.5 }, 0); 

        // 2. RADIEREN: Wieder mit 3000 (damit es komplett verschwindet)
        tl.to(".pfad-3", { strokeDashoffset: 2000, duration: 1, ease: "in-out", immediateRender: false }, 0);
        tl.to(".pfad-2", { strokeDashoffset: 2000, duration: 1, ease: "none", immediateRender: false }, 0.2);
        tl.to(".pfad-1", { strokeDashoffset: 2000, duration: 1, ease: "in", immediateRender: false }, 0.4);

    </script></body>
</html>
