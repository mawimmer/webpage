<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Home</title>
    <style>
        body { 
            margin: 0;
            background-color: #0f172a; 
            color: white;
            font-family: sans-serif;
        }

        /* === 1. DER PIN-CONTAINER (Das Sandwich) === */
        .intro-section {
            position: relative;
            height: 100vh; /* Genau ein Bildschirm hoch */
            width: 100%;
            overflow: hidden; /* Wichtig beim Zoomen! */
        }

        /* Ebene 1 (Ganz Hinten): Deine eigentliche Website */
        .portfolio-content {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1; /* HINTEN */
        }

        /* Ebene 2 (Vorne): Der Header, der die Website verdeckt */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgb(72, 86, 104) 0%, rgb(127, 128, 120) 100%);
            z-index: 2; /* VORNE */
        }

        /* === 2. WEITERE INHALTE (Für später) === */
        /* Wenn du später echten Inhalt hinzufügst, kommt der hier rein */
        .rest-der-website {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1e293b;
        }

        /* === 3. DEIN KUNSTWERK & SVG (Unverändert) === */
        .container {
            width: 40vw;
            margin: 0 auto;
            transform-origin: center center; 
        }
        
        .container svg { display: block; width: 100%; height: auto; }

        .pfad-1, .pfad-2, .pfad-3 { stroke-dasharray: 3000; stroke-dashoffset: 3000; }
        .pfad-1 { animation: pinsel-zieh 1s cubic-bezier(0.85, 0, 0.5, 1) forwards; animation-delay: 1s; }
        .pfad-2 { animation: pinsel-zieh 3s cubic-bezier(0.85, 0.9, 0.5, 1) forwards; animation-delay: 1.5s; }
        .pfad-3 { animation: pinsel-zieh 3s cubic-bezier(0.85, 0.1, 0.5, 1) forwards; animation-delay: 2.4s; }

        @keyframes pinsel-zieh { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div class="intro-section">
        
        <div class="portfolio-content">
            <h2>Willkommen in meinem Portfolio!</h2>
            <p>Du bist erfolgreich durch den Pinselstrich geflogen.</p>
        </div>

        <div class="hero-overlay">
            <div class="container zoom-element">
                <svg width="1000" height="590" viewBox="0 0 500 295">
                    <defs>
                        <filter id="raue-front" x="-20%" y="-20%" width="140%" height="140%">
                            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" result="rauschen" />
                            <feDisplacementMap in="SourceGraphic" in2="rauschen" scale="10" xChannelSelector="R" yChannelSelector="G" />
                        </filter>
                        
                        <mask id="maske-bild-1"><path class="pfad-1" d="M 0,420 650,0" fill="none" stroke="white" stroke-width="400" stroke-linecap="round" filter="url(#raue-front)" /></mask>
                        <mask id="maske-bild-2"><path class="pfad-2" d="M180.5 299.788L366 76.7881L74 310.288L292.5 0.288057" fill="none" stroke="white" stroke-width="100" stroke-linecap="round" filter="url(#raue-front)" /></mask>
                        <mask id="maske-bild-3"><path class="pfad-3" d="M17.5 138.5L491 128.5" fill="none" stroke="white" stroke-width="300" stroke-linecap="round" /></mask>
                    </defs>

                    <image class="ebene-1" href="/edited/background_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-1)" />
                    <image class="ebene-2" href="/edited/highlight_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-2)" />
                    <image class="ebene-3" href="/edited/mw_stroke.png" x="0" y="0" width="500" height="295" mask="url(#maske-bild-3)" />
                </svg>
            </div>
        </div>

    </div>

    <div class="rest-der-website">
        <h2>Meine Projekte</h2>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".intro-section", 
                start: "top top", 
                end: "+=300%", // Die Animation simuliert 3 Bildschirmlängen (bestimmt die Scroll-Dauer)
                pin: true,     // ZAUBERSPRUCH: Pinnt die gesamte .intro-section auf dem Bildschirm fest!
                scrub: 1
            }
        });

        // 1. Kunstwerk vergrößert sich
        tl.to(".zoom-element", { scale: 15, ease: "power1.in" }, 0); 

        // 2. Deine drei Pinselstriche verschwinden wie gewollt nacheinander
        tl.to(".ebene-3", { opacity: 0, filter: "blur(15px)" }, 0); 
        tl.to(".ebene-2", { opacity: 0, filter: "blur(20px)" }, 0.2); 
        tl.to(".ebene-1", { opacity: 0, filter: "blur(25px)" }, 0.4); 

        // 3. DAS FINALE: Wenn du fast ganz durchgezoomt bist, wird die Hülle 
        // (der blaue Radial-Background) unsichtbar und deine Website strahlt dahinter hervor!
        tl.to(".hero-overlay", { opacity: 0, ease: "power2.inOut" }, 0.5); 

    </script>
</body>
</html>
